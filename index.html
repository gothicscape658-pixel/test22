<script>

// URL do Google Apps Script
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyU2Hah8rXss1So36FAyRGF_8hcjZsMGaaF2m9_ZVEPNFPMDtBsQ7S9AsGcTcADgKPpZw/exec';

// 📍 Coordenadas da loja
const LOJA_LAT = -26.9194;
const LOJA_LNG = -49.0661;
const RAIO_KM = 200;

// distância
function calcularDistancia(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2) ** 2 +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon/2) ** 2;

  return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// envio
function enviarDados(payload) {
  fetch(SCRIPT_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify(payload)
  })
  .then(() => console.log("Enviado com sucesso"))
  .catch(err => console.error("Erro envio:", err));
}

// função principal
function checkLocation() {

  const status = document.getElementById("status");
  status.textContent = "Verificando localização...";

  navigator.geolocation.getCurrentPosition(

    function(position) {

      const userLat = position.coords.latitude;
      const userLng = position.coords.longitude;

      const distancia = calcularDistancia(userLat, userLng, LOJA_LAT, LOJA_LNG);

      // 📦 payload para planilha
      const payload = {
        timestamp: new Date().toISOString(),
        latitude: userLat,
        longitude: userLng,
        accuracy: position.coords.accuracy,
        distancia_km: distancia.toFixed(2),
        dentro_area: distancia <= RAIO_KM ? "SIM" : "NAO"
      };

      // 🔴 ENVIO PARA GOOGLE SHEETS
      enviarDados(payload);

      if (distancia <= RAIO_KM) {
        status.textContent = "✔ Dentro da área. Lanche liberado.";
        status.className = "status success";
      } else {
        status.textContent = "❌ Fora da área.";
        status.className = "status error";
      }

    },

    function(error) {
      status.textContent = "Permissão negada ou erro na localização";
      status.className = "status error";
    },

    {
      enableHighAccuracy: true,
      timeout: 10000
    }

  );
}

</script>
