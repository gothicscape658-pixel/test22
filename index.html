<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lanches Express - Ganhe seu Primeiro Lanche</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

body {
  background: #0f172a;
  color: #f1f5f9;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.container {
  max-width: 420px;
  width: 100%;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 24px;
  border-radius: 16px;
  text-align: center;
}

h1 {
  font-size: 22px;
  margin-bottom: 10px;
}

p {
  font-size: 15px;
  color: #cbd5f5;
  margin-bottom: 20px;
}

.highlight {
  color: #22c55e;
  font-weight: bold;
}

.offer {
  background: #111827;
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 20px;
  font-size: 14px;
}

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: #22c55e;
  color: #000;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
}

.btn:hover {
  opacity: 0.9;
}

.status {
  margin-top: 15px;
  font-size: 14px;
}

.success { color: #22c55e; }
.error { color: #ef4444; }

.footer {
  margin-top: 15px;
  font-size: 12px;
  color: #94a3b8;
}
</style>

</head>

<body>

<div class="container">
  <div class="card">

    <h1>🍔 Lanche na Brasa Lanches</h1>

    <p>
      Está perto de você?  
      <span class="highlight">Você pode ganhar seu primeiro lanche grátis.</span>
    </p>

    <div class="offer">
      ✔ Entrega rápida  
      <br>
      ✔ Ingredientes frescos  
      <br>
      ✔ Promoção válida para novos clientes na região
    </div>

    <!-- BOTÃO -->
    <button class="btn" onclick="checkLocation()">
      Verificar se estou perto de alguma loja
    </button>

    <div id="status" class="status"></div>

    <div class="footer">
      Oferta limitada para determinadas áreas de Blumenau - SC
    </div>

  </div>
</div>

<script>

// 📍 Coordenadas de referência (EXEMPLO - Blumenau)
const LOJA_LAT = -26.9194;
const LOJA_LNG = -49.0661;
const RAIO_KM = 5;

// Função para calcular distância (Haversine)
function calcularDistancia(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c;
}

// Função principal
function checkLocation() {

  const status = document.getElementById("status");
  status.textContent = "Verificando localização...";

  if (!navigator.geolocation) {
    status.textContent = "Geolocalização não suportada";
    status.className = "status error";
    return;
  }

  navigator.geolocation.getCurrentPosition(

    function(position) {

      const userLat = position.coords.latitude;
      const userLng = position.coords.longitude;

      const distancia = calcularDistancia(userLat, userLng, LOJA_LAT, LOJA_LNG);

      if (distancia <= RAIO_KM) {
        status.textContent = "✔ Você está na área! Lanche liberado.";
        status.className = "status success";
      } else {
        status.textContent = "❌ Fora da área de entrega.";
        status.className = "status error";
      }

    },

    function(error) {
      status.textContent = "Permissão negada ou erro na localização";
      status.className = "status error";
    },

    {
      enableHighAccuracy: true,
      timeout: 10000
    }

  );
}

</script>

</body>
</html>
